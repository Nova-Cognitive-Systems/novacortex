name: Release

# Cuts a release when a v* tag is pushed: builds multi-arch (amd64+arm64) api+web
# images, publishes them to GHCR as both the immutable version tag and :latest,
# then creates a GitHub Release. No external registry credentials needed — uses
# the built-in GITHUB_TOKEN.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

env:
  REGISTRY: ghcr.io
  OWNER: nova-cognitive-systems

jobs:
  images:
    name: Build & push ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # api is multi-arch (fast even emulated — just tsc). The web image's
        # `next build` is impractically slow under QEMU arm64 emulation, so it
        # ships amd64 for now; native-runner arm64 web is a fast-follow.
        include:
          - component: api
            platforms: linux/amd64,linux/arm64
          - component: web
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/novacortex-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/${{ matrix.component }}/Dockerfile
          target: production
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  release:
    name: GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          notes="See CHANGELOG.md. Self-host images published to:
          - ghcr.io/${OWNER}/novacortex-api:${VERSION}
          - ghcr.io/${OWNER}/novacortex-web:${VERSION}

          Install: set NOVACORTEX_VERSION=${VERSION} in .env (scripts/gen-env.sh) and
          run \`docker compose -f docker-compose.unraid.yml up -d\`."
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "$notes" --verify-tag
