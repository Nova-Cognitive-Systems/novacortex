# ============================================
# NovaCortex - Local / On-Prem Development Stack
# Usage: docker compose -f docker-compose.dev.yml up --build
# ============================================

networks:
  novacortex-dev:
    driver: bridge

volumes:
  surrealdb-data-dev:
  qdrant-data-dev:
  redis-data-dev:

services:
  # ============================================
  # SurrealDB (persistent rocksdb)
  # ============================================
  surrealdb:
    image: surrealdb/surrealdb:v2.2
    container_name: novacortex-surrealdb-dev
    restart: unless-stopped
    user: root
    networks:
      - novacortex-dev
    ports:
      - "8000:8000"
    command:
      - start
      - --log=info
      - --user=${SURREALDB_USER:-root}
      - --pass=${SURREALDB_PASS:-root}
      - --bind=0.0.0.0:8000
      - rocksdb:/data/database
    volumes:
      - surrealdb-data-dev:/data
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--conn", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ============================================
  # Qdrant Vector Database
  # ============================================
  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: novacortex-qdrant-dev
    restart: unless-stopped
    networks:
      - novacortex-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__ENABLE_TLS=false
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
    volumes:
      - qdrant-data-dev:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo ok'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ============================================
  # Redis (no password in dev)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: novacortex-redis-dev
    restart: unless-stopped
    networks:
      - novacortex-dev
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # API Service - Development (hot-reload)
  # ============================================
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: development
    container_name: novacortex-api-dev
    restart: unless-stopped
    networks:
      - novacortex-dev
    ports:
      - "3001:3001"
      - "9229:9229"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DEBUG=novacortex:*
      - LOG_LEVEL=debug
      # SurrealDB - use Docker internal hostname
      - SURREALDB_URL=ws://surrealdb:8000/rpc
      - SURREALDB_NAMESPACE=${SURREALDB_NAMESPACE:-novacortex}
      - SURREALDB_DATABASE=${SURREALDB_DATABASE:-development}
      - SURREALDB_USER=${SURREALDB_USER:-root}
      - SURREALDB_PASS=${SURREALDB_PASS:-root}
      # Qdrant - use Docker internal hostname
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Redis - no password in dev
      - REDIS_URL=redis://redis:6379
      # Auth
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      # CORS: allow local browser + web container
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      # Optional AI keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # License (free tier — 3 namespaces)
      - LICENSE_KEY=${LICENSE_KEY:-MS-FREE-mnskhsxz-117617dd-011fe479-A07B447D}
    depends_on:
      surrealdb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api/src:/app/packages/api/src:delegated
      - ./packages/core/src:/app/packages/core/src:delegated
      - ./packages/core/dist:/app/packages/core/dist:delegated
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G

  # ============================================
  # Web Service - Development (hot-reload)
  # ============================================
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      target: development
    container_name: novacortex-web-dev
    restart: unless-stopped
    networks:
      - novacortex-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      # Browser-accessible URL (via host machine port mapping)
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
      # SSR server-side URL (Docker internal)
      - API_INTERNAL_URL=http://api:3001
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./packages/web/src:/app/packages/web/src:delegated
      - ./packages/web/public:/app/packages/web/public:delegated
      # Preserve node_modules and Next.js cache inside container
      - /app/packages/web/node_modules
      - /app/packages/web/.next
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
