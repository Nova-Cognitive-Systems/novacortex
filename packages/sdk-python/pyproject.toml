[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "novacortex"
version = "1.1.0"
description = "NovaCortex Python SDK"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.optional-dependencies]
async = ["anyio>=4.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "respx>=0.21"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
