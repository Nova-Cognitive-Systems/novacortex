# NovaCortex Edge Worker - Cloudflare Configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "novacortex-edge"
main = "dist/edge/worker.js"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

# Worker settings
workers_dev = true
logpush = false

# Build configuration
[build]
command = "npm run build:edge"
watch_dir = "src/edge"

# Production environment
[env.production]
name = "novacortex-edge"
routes = [
  { pattern = "api.novacortex.io/*", zone_name = "novacortex.io" },
  { pattern = "edge.novacortex.io/*", zone_name = "novacortex.io" }
]

# Staging environment
[env.staging]
name = "novacortex-edge-staging"
routes = [
  { pattern = "api-staging.novacortex.io/*", zone_name = "novacortex.io" }
]

# Development (default) uses workers.dev subdomain

# ---------------------
# KV Namespaces
# ---------------------

# Memory cache - stores frequently accessed memories
[[kv_namespaces]]
binding = "MEMORY_CACHE"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

[[env.production.kv_namespaces]]
binding = "MEMORY_CACHE"
id = "REPLACE_WITH_PROD_KV_ID"

[[env.staging.kv_namespaces]]
binding = "MEMORY_CACHE"
id = "REPLACE_WITH_STAGING_KV_ID"

# Session cache - stores active session data
[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "REPLACE_WITH_SESSION_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_SESSION_KV_ID"

[[env.production.kv_namespaces]]
binding = "SESSION_CACHE"
id = "REPLACE_WITH_PROD_SESSION_KV_ID"

[[env.staging.kv_namespaces]]
binding = "SESSION_CACHE"
id = "REPLACE_WITH_STAGING_SESSION_KV_ID"

# Rate limiting storage
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_RATE_LIMIT_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_RATE_LIMIT_KV_ID"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_PROD_RATE_LIMIT_KV_ID"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_STAGING_RATE_LIMIT_KV_ID"

# ---------------------
# D1 Database (Optional)
# ---------------------
# Uncomment to use D1 for edge-local data
# [[d1_databases]]
# binding = "DB"
# database_name = "novacortex-edge"
# database_id = "REPLACE_WITH_D1_ID"

# ---------------------
# Environment Variables
# ---------------------

[vars]
WORKER_VERSION = "1.0.0"
ENABLE_CACHE = "true"
ENABLE_COMPRESSION = "true"
CACHE_TTL_SECONDS = "300"
CORS_ORIGINS = "*"

[env.production.vars]
WORKER_VERSION = "1.0.0"
ENABLE_CACHE = "true"
ENABLE_COMPRESSION = "true"
CACHE_TTL_SECONDS = "600"
CORS_ORIGINS = "https://novacortex.io,https://app.novacortex.io"

[env.staging.vars]
WORKER_VERSION = "1.0.0-staging"
ENABLE_CACHE = "true"
ENABLE_COMPRESSION = "true"
CACHE_TTL_SECONDS = "60"
CORS_ORIGINS = "https://staging.novacortex.io"

# ---------------------
# Secrets (set via wrangler secret put)
# ---------------------
# Required secrets:
# - SURREALDB_URL
# - SURREALDB_USER
# - SURREALDB_PASS
# - SURREALDB_NS
# - SURREALDB_DB
# - QDRANT_URL
# - QDRANT_API_KEY (optional)
# - QDRANT_COLLECTION
# - API_KEY_SALT
#
# Optional regional replicas:
# - SURREALDB_READ_REPLICA_EU
# - SURREALDB_READ_REPLICA_US
# - SURREALDB_READ_REPLICA_ASIA

# ---------------------
# Cron Triggers (Scheduled Workers)
# ---------------------

[triggers]
crons = [
  "*/5 * * * *",   # Every 5 minutes - cache cleanup
  "0 * * * *",     # Every hour - decay processing
  "0 0 * * *"      # Daily - memory consolidation
]

# ---------------------
# Observability
# ---------------------

[observability]
enabled = true

# Tail workers for logging (optional)
# [[tail_consumers]]
# service = "novacortex-logger"

# ---------------------
# Limits
# ---------------------

[limits]
cpu_ms = 50

# ---------------------
# Placement (Optional)
# ---------------------
# Smart placement hints for latency optimization
# [placement]
# mode = "smart"

